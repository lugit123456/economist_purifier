# Netlify 部署配置
# 架构: publish = 项目根, 不跑任何 build
# index.html 直接在根,引用 frontend/database.js 等 (路径无需改写)

[build]
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.9"

# ============================================================
# 安全: 阻挡敏感路径
# 详见项目根 _redirects 文件
# ============================================================

# ============================================================
# 安全 Headers
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ============================================================
# 静态资源缓存
# ============================================================
[[headers]]
  for = "/frontend/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/frontend/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/frontend/database.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"